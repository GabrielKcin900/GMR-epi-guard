<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPI Guard</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b98a8;
      --accent: #3b82f6;
      --ok: #22c55e;
      --deny: #ef4444;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    main {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 .25rem; font-size: 1.4rem; }
    .sub { color: var(--muted); font-size: .9rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: .35rem; }
    input[type=text] {
      width: 100%;
      padding: .65rem .75rem;
      border: 1px solid #2d3a4d;
      border-radius: 8px;
      background: #111827;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    fieldset {
      border: 1px solid #2d3a4d;
      border-radius: 8px;
      padding: .75rem 1rem 1rem;
      margin: 0 0 1rem;
    }
    legend { color: var(--muted); font-size: .85rem; padding: 0 .25rem; }
    .epi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .epi-grid label {
      display: flex;
      align-items: center;
      gap: .45rem;
      color: var(--text);
      font-size: .95rem;
      margin: 0;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: wait; }
    #result {
      margin-top: 1rem;
      padding: .85rem 1rem;
      border-radius: 8px;
      font-size: .95rem;
      line-height: 1.45;
      display: none;
    }
    #result.show { display: block; }
    #result.ok { background: rgba(34,197,94,.15); border: 1px solid var(--ok); }
    #result.deny { background: rgba(239,68,68,.12); border: 1px solid var(--deny); }
    #result.err { background: rgba(245,158,11,.12); border: 1px solid var(--warn); }
  </style>
</head>
<body>
  <main>
    <h1>EPI Guard</h1>
    <p class="sub">Verificacao de EPIs via firmware ESP32</p>
    <form id="form">
      <label for="who">Quem esta entrando?</label>
      <input type="text" id="who" name="who" placeholder="Gabriel" required autocomplete="name">
      <fieldset>
        <legend>EPIs presentes</legend>
        <div class="epi-grid">
          <label><input type="checkbox" class="epi" value="Capacete"> Capacete</label>
          <label><input type="checkbox" class="epi" value="Oculos"> Oculos</label>
          <label><input type="checkbox" class="epi" value="Luva"> Luva</label>
          <label><input type="checkbox" class="epi" value="Cinto"> Cinto</label>
          <label><input type="checkbox" class="epi" value="Bota"> Bota</label>
          <label><input type="checkbox" class="epi" value="Protetor auricular"> Prot. auricular</label>
        </div>
      </fieldset>
      <button type="submit" id="btn">Verificar</button>
    </form>
    <div id="result" role="status"></div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
