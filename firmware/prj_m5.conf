# M5 — dashboard HTTP via sockets (combinar com prj.conf; prj_m3.conf; prj_m4.conf)

CONFIG_EPI_HTTP_SERVER=y

# Evita acumulo de sockets TIME_WAIT durante testes repetidos no browser
CONFIG_NET_TCP_TIME_WAIT_DELAY=0

# Servidor HTTP (listen + cliente) + cliente API outbound ao mesmo tempo
CONFIG_NET_MAX_CONN=8
CONFIG_NET_MAX_CONTEXTS=12
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_ZVFS_POLL_MAX=8
